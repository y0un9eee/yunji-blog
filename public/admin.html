<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>관리자 패널 - 윤지의 블로그</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wgth@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <header>
            <div class="container">
                <div class="logo"><a href="/">윤지의 블로그</a></div>
                <nav>

                    <a href="/admin" id="nav-admin" style="display: none">관리자</a>
                    <a href="/write" class="btn btn-primary" id="nav-write" style="display: none">글쓰기</a>

        <main>
            <div class="container">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;">

                <div class="table-container">

                                <th>작성일</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="post-tbody">
                            <tr><td colspan="4" class="loading">불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer>
            <p>윤지의 블로그. All rights reserved.</p>
        </footer>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="/js/main.js"></script>
        <script src="/js/admin.js"></script>
