<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>윤지의 블로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="logo"><a href="/">윤지의 블로그</a></div>
      <nav>
        <span id="nav-username" style="display:none"></span>
        <a href="/admin" id="nav-admin" style="display:none">관리자</a>
        <a href="/write" class="btn btn-primary" id="nav-write" style="display:none">글쓰기</a>
        <a href="/login" id="nav-login">로그인</a>
        <a href="/register" class="btn btn-primary" id="nav-register">회원가입</a>
        <a href="#" id="nav-logout" style="display:none">로그아웃</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">최근 글</h1>
      <div id="post-list" class="post-list">
        <div class="loading">불러오는 중...</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </div>
  </main>

  <footer>
    <p>© 2025 윤지의 블로그. All rights reserved.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let currentPage = 1;

    async function loadPosts(page) {
      currentPage = page;
      $('#post-list').html('<div class="loading">불러오는 중...</div>');
      try {
        const data = await API.get(`/api/posts?page=${page}`);
        renderPosts(data.posts);
        renderPagination(data.page, data.pages);
      } catch {
        $('#post-list').html('<div class="empty-state"><p>포스트를 불러오지 못했습니다.</p></div>');
      }
    }

    function renderPosts(posts) {
      if (!posts.length) {
        $('#post-list').html('<div class="empty-state"><p>아직 작성된 글이 없습니다.</p></div>');
        return;
      }
      const html = posts.map(p => `
        <a class="post-card" href="/post/${p.id}">
          <h2>${$('<div>').text(p.title).html()}</h2>
          <div class="post-meta">
            <span>✍️ ${p.author}</span>
            <span>${formatDate(p.created_at)}</span>
          </div>
        </a>
      `).join('');
      $('#post-list').html(html);
    }

    function renderPagination(page, pages) {
      if (pages <= 1) { $('#pagination').empty(); return; }
      const items = [];
      for (let i = 1; i <= pages; i++) {
        items.push(`<a href="#" class="${i === page ? 'active' : ''}" data-page="${i}">${i}</a>`);
      }
      $('#pagination').html(items.join(''));
    }

    $(document).ready(function () {
      loadPosts(1);
      $(document).on('click', '.pagination a', function (e) {
        e.preventDefault();
        loadPosts(parseInt($(this).data('page')));
        $('html, body').animate({ scrollTop: 0 }, 300);
      });
    });
  </script>
</body>
</html>
